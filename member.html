<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라라어트 코칭 플랜</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--pink:#D4537E;--pink-light:#FBEAF0;--pink-dark:#993556;--cream:#FAF7F2;--border:#E8DDD0;--text:#2C1810;--text2:#7A5C4E;--text3:#A8927F;--green:#3B6D11;--green-bg:#EAF3DE;--blue:#185FA5;--blue-bg:#E6F1FB;--amber:#854F0B;--amber-bg:#FAEEDA;--red:#A32D2D;--red-bg:#FCEBEB;--purple:#534AB7;--purple-bg:#F4EEFE;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
  header{background:white;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--text);font-style:italic;}
  .logo span{font-style:normal;font-size:11px;color:var(--text3);display:block;letter-spacing:0.1em;}
  .container{max-width:860px;margin:0 auto;padding:28px 20px 60px;}
  .loading{text-align:center;padding:80px 20px;color:var(--text3);font-size:15px;}
  .loading .spin{font-size:32px;display:block;margin-bottom:12px;animation:spin 1.5s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .member-hero{background:white;border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;display:flex;align-items:center;gap:18px;}
  .avatar{width:56px;height:56px;border-radius:50%;background:var(--pink-light);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:var(--pink);flex-shrink:0;}
  .hero-info .name{font-size:20px;font-weight:600;margin-bottom:4px;}
  .hero-info .sub{font-size:13px;color:var(--text3);}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .tag{font-size:11px;padding:3px 12px;border-radius:20px;}
  .tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;}
  .tab{padding:9px 20px;border-radius:20px;border:1px solid var(--border);background:white;color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
  .tab.on{background:var(--pink);color:white;border-color:var(--pink);font-weight:500;}
  .tab-content{display:none;}
  .tab-content.on{display:block;}
  .card{background:white;border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;}
  .card-title{font-size:11px;letter-spacing:0.12em;color:var(--text3);margin-bottom:14px;font-weight:500;}
  .cal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .cal-box{background:var(--cream);border-radius:10px;padding:16px;text-align:center;}
  .cal-box.highlight{background:var(--pink-light);border:1px solid var(--pink);}
  .cal-label{font-size:11px;color:var(--text3);margin-bottom:6px;}
  .cal-val{font-size:24px;font-weight:600;color:var(--text);}
  .cal-val.pink{color:var(--pink);}
  .cal-val span{font-size:13px;font-weight:400;color:var(--text3);}
  .macro-bar{height:10px;border-radius:5px;overflow:hidden;background:var(--border);display:flex;margin:12px 0 8px;}
  .bar-p{background:var(--pink);}
  .bar-c{background:#F4C0D1;}
  .bar-f{background:#FAC775;}
  .macro-legend{display:flex;gap:16px;font-size:12px;color:var(--text2);flex-wrap:wrap;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}

  /* ── 미션 스타일 ── */
  .week-block{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
  .week-head{background:var(--pink-light);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .week-num{font-weight:600;font-size:15px;color:var(--pink-dark);}
  .week-theme{font-size:12px;color:var(--pink);}
  .week-body{padding:14px 18px;display:none;}
  .week-body.open{display:block;}
  .chevron{font-size:12px;color:var(--pink);transition:transform 0.2s;}
  .chevron.open{transform:rotate(180deg);}
  .mission-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f0e8e0;align-items:flex-start;}
  .mission-row:last-child{border-bottom:none;}
  .mbadge{font-size:11px;padding:3px 10px;border-radius:12px;flex-shrink:0;margin-top:1px;white-space:nowrap;}
  .mission-txt{font-size:13px;color:var(--text);line-height:1.6;}
  .daily-section{margin-top:14px;padding-top:12px;border-top:1px solid #f0e8e0;}
  .daily-title{font-size:11px;color:var(--text3);letter-spacing:0.08em;margin-bottom:8px;}
  .daily-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .daily-box{border-radius:8px;padding:7px 5px;text-align:center;border:1px solid var(--border);background:var(--cream);}
  .daily-box.body-check{background:var(--pink-light);border-color:var(--pink);}
  .daily-day{font-size:10px;font-weight:600;color:var(--pink);margin-bottom:3px;}
  .body-check .daily-day{color:var(--pink-dark);}
  .daily-num{font-size:9px;color:var(--text3);margin-bottom:4px;}
  .daily-txt{font-size:10px;color:var(--text);line-height:1.4;}

  .day-block{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px;}
  .day-head{background:var(--cream);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .day-head-left{font-weight:600;font-size:14px;}
  .day-kcal{font-size:12px;color:var(--text3);}
  .day-meals{display:none;}
  .day-meals.open{display:block;}
  .meal-row{display:grid;grid-template-columns:52px 1fr auto;gap:10px;padding:9px 16px;border-top:1px solid #f0e8e0;font-size:13px;align-items:center;}
  .meal-type{color:var(--text3);font-size:12px;}
  .meal-kcal{color:var(--pink);font-size:12px;}
  .free-box{background:var(--amber-bg);border:1px solid #FAC775;border-radius:10px;padding:14px 16px;margin-top:8px;}
  .free-title{font-size:13px;font-weight:600;color:var(--amber);margin-bottom:8px;}
  .free-list{font-size:12px;color:#633806;line-height:2.1;}
  .workout-week{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
  .workout-head{background:var(--cream);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:600;}
  .workout-body{display:none;}
  .workout-body.open{display:block;}
  .workout-day{display:flex;align-items:center;gap:12px;padding:10px 18px;border-top:1px solid #f0e8e0;}
  .workout-day-label{font-size:12px;color:var(--text3);width:24px;flex-shrink:0;}
  .workout-badge{font-size:11px;padding:2px 8px;border-radius:6px;flex-shrink:0;}
  .wt-tabata{background:var(--red-bg);color:var(--red);}
  .wt-lower{background:var(--pink-light);color:var(--pink-dark);}
  .wt-upper{background:var(--amber-bg);color:var(--amber);}
  .wt-core{background:var(--purple-bg);color:var(--purple);}
  .wt-strength{background:var(--blue-bg);color:var(--blue);}
  .wt-stretch{background:var(--green-bg);color:var(--green);}
  .wt-rest{color:var(--text3);font-size:12px;}
  .workout-link{font-size:12px;color:var(--text3);text-decoration:none;}
  .workout-link:hover{color:var(--pink);}
  .workout-link.has-url{color:var(--pink);font-weight:500;}
  .legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  @media(max-width:600px){.cal-grid{grid-template-columns:1fr 1fr;}.daily-grid{grid-template-columns:repeat(4,1fr);}.member-hero{flex-direction:column;align-items:flex-start;}header{padding:14px 16px;}.container{padding:16px 12px 60px;}}
  .general-meal-guide-box{background:#FFF8E6;border:1px solid #F4A93C;border-radius:10px;padding:14px 16px;margin-top:20px;}
  .guide-title{font-weight:700;font-size:14px;color:#C47A15;margin-bottom:8px;}
  .guide-list{list-style:none;padding:0;margin:0 0 10px 0;font-size:13px;color:#555;line-height:1.8;}
  .guide-links{font-size:12px;color:#888;}
  .guide-links a{color:#E8832A;text-decoration:underline;}
</style>
</head>
<body>
<header>
  <div class="logo">rara diet <span>MY COACHING PLAN</span></div>
  <div style="font-size:12px;color:var(--text3);">라라어트</div>
</header>
<div class="container">
  <div class="loading" id="loading"><span class="spin">🌸</span>코칭 플랜을 불러오는 중이에요...</div>
  <div id="main" style="display:none;">
    <div class="member-hero">
      <div class="avatar" id="avatar"></div>
      <div class="hero-info"><div class="name" id="hero-name"></div><div class="sub" id="hero-sub"></div><div class="tags" id="hero-tags"></div></div>
    </div>
    <div class="tabs">
      <div class="tab on" onclick="showTab('summary',this)">📊 목표 칼로리</div>
      <div class="tab" onclick="showTab('mission',this)">📋 4주 미션</div>
      <div class="tab" onclick="showTab('meal',this)">🥗 식단표</div>
      <div class="tab" onclick="showTab('workout',this)">🏋️ 운동 플랜</div>
    </div>
    <div class="tab-content on" id="tab-summary">
      <div class="card"><div class="card-title">목표 칼로리</div><div class="cal-grid" id="cal-grid"></div></div>
      <div class="card"><div class="card-title">탄단지 분배</div><div id="macro-section"></div></div>
    </div>
    <div class="tab-content" id="tab-mission"><div id="mission-section"></div></div>
    <div class="tab-content" id="tab-meal">
      <div style="font-size:12px;color:var(--text3);margin-bottom:14px;">각 날짜를 눌러 식단을 확인하세요. 1-2주차, 3-4주차 동일하게 반복돼요.</div>
      <div id="meal-section"></div>
    </div>
    <div class="tab-content" id="tab-workout">
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px;" id="workout-level-label"></div>
      <div class="legend" id="workout-legend"></div>
      <div id="workout-section"></div>
    </div>
  </div>
</div>
<script>
// ── 계산 엔진 ──
function calcBMR(d){if(d.골격근량&&d.체지방량){const ffm=d.현재체중-d.체지방량;return Math.round(370+21.6*ffm);}if(d.성별==='여성')return Math.round(655.0955+9.5634*d.현재체중+1.8496*d.키-4.6756*d.나이);return Math.round(66.4730+13.7516*d.현재체중+5.0033*d.키-6.7550*d.나이);}
function calcActivityFactor(d){const actMap={'매우 적음 (주로 앉아서 생활)':1.20,'보통 (가끔 걷는 편)':1.35,'많은 편 (활동량 많음)':1.50};let af=actMap[d.평소활동량]||1.30;if(d.걸음수?.includes('3,000보 미만'))af-=0.03;else if(d.걸음수?.includes('8,000')||d.걸음수?.includes('10,000'))af+=0.05;if(d.앉아있는시간?.includes('10시간'))af-=0.02;if(d.운동여부!=='안 함'){const freqMap={'주 1회':1,'주 2회':1,'주 3회':2,'주 4회':2,'주 5회 이상':3};const durMap={'30분 이내':1,'30~60분':2,'60~90분':3,'90분 이상':3};const intMap={'가볍게 (땀 거의 안 남)':1,'보통 (땀이 남)':2,'강하게 (숨 많이 참)':3};const score=(freqMap[d.운동빈도]||0)+(durMap[d.운동시간]||1)+(intMap[d.운동강도]||1);if(score<=2)af+=0;else if(score<=4)af+=0.05;else if(score<=6)af+=0.10;else if(score<=8)af+=0.15;else af+=0.20;}return Math.min(Math.max(Math.round(af*100)/100,1.20),1.70);}
function calcDietRisk(d){let n=0;if(d.외식빈도?.includes('거의 매일')||d.외식빈도?.includes('주 4')||d.외식빈도?.includes('주 5'))n++;if(d.폭식?.includes('자주')||d.폭식?.includes('가끔'))n++;if(d.야식==='있음')n++;if(d.식사규칙성?.includes('불규칙')||d.식사시간?.includes('불규칙'))n++;if(d.단백질섭취빈도?.includes('거의')||d.단백질섭취빈도?.includes('1회'))n++;return n<=1?0:n===2?1:2;}
function calcRecoveryRisk(d){let n=0;if(d.수면시간==='5시간 미만'||d.수면시간==='5~6시간')n++;if(d.수면질&&d.수면질<=2)n++;if(d.스트레스&&d.스트레스>=4)n++;else if(d.스트레스&&d.스트레스>=3)n++;if(d.피로도&&d.피로도>=4)n++;return n<=1?0:n===2?1:2;}
function calcHormoneRisk(d){if(d.성별!=='여성')return 0;let n=0;if(d.PMS==='심한 편'||d.PMS==='약간 있음')n++;if(d.생리주기규칙성==='불규칙')n++;if(d.붓기?.includes('심'))n++;if(d.생리중운동==='거의 불가능')n++;if(d.저탄수반응?.includes('저하')||d.저탄수반응?.includes('힘듦'))n++;return n<=1?0:n===2?1:2;}
function parseGoalType(d){const g=d.목표||'';if((g.includes('체지방')||g.includes('감량'))&&(g.includes('근육')||g.includes('증량')))return'conservative_cut';if(g.includes('근육')||g.includes('증량'))return'gain';if(g.includes('유지'))return'maintenance';if(g.includes('보수')||g.includes('천천히'))return'conservative_cut';return'general_cut';}
function selectMacroProfile(goalType,af,hormoneRisk,d){if(goalType==='gain')return{carb:0.475,protein:0.275,fat:0.25,label:'증량형'};if(af>=1.50||d.운동빈도?.includes('주 4')||d.운동빈도?.includes('주 5'))return{carb:0.50,protein:0.30,fat:0.20,label:'운동수행형'};if(hormoneRisk>=2||d.폭식?.includes('자주'))return{carb:0.375,protein:0.30,fat:0.325,label:'호르몬민감형'};return{carb:0.40,protein:0.30,fat:0.30,label:'일반감량형'};}
function calcAll(d){const bmr=calcBMR(d),totalFactor=calcActivityFactor(d),tdee=Math.round(bmr*totalFactor);const dietRisk=calcDietRisk(d),recoveryRisk=calcRecoveryRisk(d),hormoneRisk=calcHormoneRisk(d);const riskSum=dietRisk+recoveryRisk+hormoneRisk;const goalType=parseGoalType(d);const baseOffset={conservative_cut:-350,general_cut:-550,maintenance:0,gain:+200}[goalType];let riskAdjust=0;if(riskSum>=4)riskAdjust+=200;else if(riskSum>=2)riskAdjust+=100;if(dietRisk>=2)riskAdjust+=100;if(recoveryRisk>=2)riskAdjust+=100;if(hormoneRisk>=2)riskAdjust+=100;const safetyFlag=hormoneRisk>=2||recoveryRisk>=2||d.생리주기규칙성==='불규칙'||d.폭식?.includes('자주')||d.수면시간==='5시간 미만';let targetCal=Math.round(tdee+baseOffset+riskAdjust);targetCal=Math.max(targetCal,bmr);if(goalType==='conservative_cut'||goalType==='general_cut')targetCal=Math.min(targetCal,tdee-200);if(goalType==='gain')targetCal=Math.min(targetCal,tdee+250);if(goalType==='maintenance'){targetCal=Math.min(targetCal,tdee+100);targetCal=Math.max(targetCal,tdee-100);}const macro=selectMacroProfile(goalType,totalFactor,hormoneRisk,d);const protein=Math.round(targetCal*macro.protein/4);const fat=Math.max(Math.round(targetCal*macro.fat/9),40);const carb=Math.max(Math.round(targetCal*macro.carb/4),50);const proteinPct=Math.round(protein*4/targetCal*100);const fatPct=Math.round(fat*9/targetCal*100);const carbPct=100-proteinPct-fatPct;const freqMap2={'주 1회':1,'주 2회':2,'주 3회':3,'주 4회':4,'주 5회 이상':5};const freq=freqMap2[d.운동빈도]||0;let workoutLevel='beginner';if(d.운동여부==='안 함')workoutLevel='beginner';else if(freq>=4)workoutLevel='advanced';else if(freq>=2)workoutLevel='intermediate';let userType='균형형';if(dietRisk>=2&&freq<=1)userType='저활동-식습관위험형';else if(freq>=3&&dietRisk>=1)userType='운동하지만정체형';else if(recoveryRisk>=2)userType='생활리듬붕괴형';else if(hormoneRisk>=2)userType='호르몬민감형';else if(goalType==='gain')userType='체형개선형';return{bmr,tdee,targetCal,totalFactor:totalFactor.toFixed(2),protein,fat,carb,proteinPct,fatPct,carbPct,dietRisk,recoveryRisk,hormoneRisk,riskSum,riskAdjust,safetyFlag,goalType,macroLabel:macro.label,macroRatio:{carb:macro.carb,protein:macro.protein,fat:macro.fat},workoutLevel,userType};}

const DOMAIN_INFO={야식폭식:{label:'야식·폭식 차단',emoji:'🌙',bg:'var(--purple-bg)',color:'var(--purple)'},단백질:{label:'단백질 강화',emoji:'🥩',bg:'var(--pink-light)',color:'var(--pink-dark)'},외식:{label:'외식 관리',emoji:'🍽️',bg:'var(--amber-bg)',color:'var(--amber)'},운동:{label:'운동 루틴',emoji:'🏋️',bg:'var(--blue-bg)',color:'var(--blue)'},수면:{label:'수면 개선',emoji:'😴',bg:'var(--purple-bg)',color:'var(--purple)'},수분:{label:'수분 섭취',emoji:'💧',bg:'var(--blue-bg)',color:'var(--blue)'},걸음:{label:'활동량 증가',emoji:'👟',bg:'var(--green-bg)',color:'var(--green)'},스트레스:{label:'스트레스 관리',emoji:'🧘',bg:'var(--green-bg)',color:'var(--green)'},자율신경:{label:'자율신경 회복',emoji:'🌿',bg:'var(--green-bg)',color:'var(--green)'}};

function scoreDomains(d){const noExercise=d.운동여부==='안 함'||d.운동빈도?.includes('0')||!d.운동빈도;return{야식폭식:(d.야식==='있음'?3:0)+(d.폭식?.includes('자주')?3:d.폭식?.includes('가끔')?2:0),단백질:(d.단백질섭취빈도?.includes('거의')?3:d.단백질섭취빈도?.includes('1회')?2:0),외식:(d.외식빈도?.includes('매일')?3:(d.외식빈도?.includes('주 4')||d.외식빈도?.includes('주 5'))?2:d.외식빈도?.includes('주 3')?1:0),운동:(noExercise?3:d.운동빈도?.includes('주 1')?2:d.운동빈도?.includes('주 2')?1:0),수면:(d.수면시간==='5시간 미만'?3:d.수면시간==='5~6시간'?2:0)+(d.수면질&&d.수면질<=2?1:0),수분:((d.물섭취량||'').includes('1L 미만')||(d.물섭취량||'').includes('1L미만')?3:(d.물섭취량||'').includes('1~1.5')||(d.물섭취량||'').includes('1.5L 미만')?2:0),걸음:(d.걸음수?.includes('3,000보 미만')?3:d.걸음수?.includes('5,000')?2:0),스트레스:(d.스트레스>=4?3:d.스트레스>=3?2:0)+(d.피로도>=4?1:0),자율신경:(d.기상어지러움==='자주 있음'?3:d.기상어지러움==='가끔 있음'?2:0)+(d.기상후개운함==='자주 그렇다'?2:d.기상후개운함==='가끔 그렇다'?1:0)+(d.아침심박불안==='자주 있음'?2:d.아침심박불안==='가끔 있음'?1:0)+(d.기상직후스마트폰==='항상'?1:0)};}
function pickDailyMission(theme,d,weekNum,dayIdx){if(theme==='bodycheck')return BODY_CHECK_TEXT;const pool=DAILY_POOLS[theme];if(!pool)return'오늘 하루 건강한 습관 1가지 실천하기';let cands=[...pool.default];if(theme==='식단'){if(d.폭식?.includes('자주')||d.폭식?.includes('가끔'))cands=[...pool.폭식있음,...cands];else if(d.단백질섭취빈도?.includes('거의')||d.단백질섭취빈도?.includes('1회'))cands=[...pool.단백질부족,...cands];}if(theme==='활동'){if(d.운동여부==='안 함')cands=[...pool.운동없음,...cands];else if(d.걸음수?.includes('3,000보 미만')||d.걸음수?.includes('5,000'))cands=[...pool.걸음부족,...cands];}if(theme==='수분'){if((d.물섭취량||'').includes('1L')||(d.물섭취량||'').includes('1~1.5'))cands=[...pool.수분부족,...cands];}if(theme==='행동교정'){if(d.야식==='있음')cands=[...pool.야식있음,...cands];else if(d.외식빈도?.includes('주 3')||d.외식빈도?.includes('주 4')||d.외식빈도?.includes('매일'))cands=[...pool.외식많음,...cands];}if(theme==='식단점검'){if(d.폭식?.includes('자주')||d.폭식?.includes('가끔'))cands=[...pool.폭식있음,...cands];}if(theme==='회복'){const hasANS=(d.기상어지러움==='자주 있음'||d.기상후개운함==='자주 그렇다'||d.아침심박불안==='자주 있음');if(hasANS)cands=[...pool.자율신경불량,...cands];else if(d.스트레스>=4)cands=[...pool.스트레스높음,...cands];else if(d.수면시간==='5시간 미만'||d.수면시간==='5~6시간')cands=[...pool.수면부족,...cands];}const seed=(weekNum-1)*13+dayIdx*7;return cands[seed%cands.length];}
function generateMissions(d,calc){const scores=scoreDomains(d);const ranked=Object.entries(scores).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);const top8=ranked.slice(0,8);const weekDomainPairs=[[top8[0],top8[1]],[top8[2],top8[3]],[top8[4],top8[5]],[top8[6],top8[7]]];const weeks=weekDomainPairs.map(([dom1,dom2],wi)=>{const weekNum=wi+1;const info1=DOMAIN_INFO[dom1],info2=DOMAIN_INFO[dom2];return{weekNum,theme:WEEK_THEMES[wi],mission1:{domainKey:dom1,...info1,text:DOMAIN_MISSIONS[dom1][wi],score:scores[dom1]},mission2:{domainKey:dom2,...info2,text:DOMAIN_MISSIONS[dom2][wi],score:scores[dom2]},dailyMissions:DAY_THEMES.map((theme,di)=>({dayNum:wi*7+di+1,dayLabel:DAY_LABELS[di],theme,isBodyCheck:theme==='bodycheck',text:pickDailyMission(theme,d,weekNum,di)})),domainScores:scores};});return{weeks,domainScores:scores,rankedDomains:ranked};}

function pickSingleVeggie(mealType,badWords,usedVeggiesDay){const cands=(FOODS_DB||[]).filter(f=>{if(f.category!=='채소')return false;if(!f.meals?.includes(mealType))return false;if(badWords.some(b=>b&&f.name?.includes(b)))return false;if(usedVeggiesDay.has(f.name))return false;return true;});if(!cands.length){const fb=(FOODS_DB||[]).filter(f=>f.category==='채소'&&f.meals?.includes(mealType)&&!badWords.some(b=>b&&f.name?.includes(b)));return fb[Math.floor(Math.random()*fb.length)]||null;}const chosen=cands[Math.floor(Math.random()*cands.length)];usedVeggiesDay.add(chosen.name);return chosen;}
function pickCarbFromPool(mealType,usedCarbsByMeal){const pool=CARB_POOLS[mealType]||CARB_POOLS['아침'];const limit=CARB_POOL_LIMIT[mealType]||3;const used=usedCarbsByMeal[mealType]||[];const avail=pool.filter(c=>used.filter(u=>u===c).length<Math.ceil(7/limit));const chosen=avail.length?avail[Math.floor(Math.random()*avail.length)]:pool[Math.floor(Math.random()*pool.length)];usedCarbsByMeal[mealType]=[...used,chosen];return chosen;}
function pickProteinFood(db,mealType,badWords,usedNames,seafoodCountRef){const isSeafoodOk=seafoodCountRef.count<MAX_SEAFOOD_PER_WEEK;const cands=db.filter(f=>{if(!f.meals?.includes(mealType))return false;const cat=(f.category||'').toLowerCase();if(!cat.includes('단백')&&!cat.includes('protein'))return false;if(badWords.some(b=>b&&f.name?.includes(b)))return false;if(SEAFOOD_NAMES.some(s=>f.name?.includes(s))&&!isSeafoodOk)return false;return true;});if(!cands.length)return null;const prio=cands.filter(f=>PRIORITY_PROTEINS.some(p=>f.name?.includes(p))&&!usedNames.has(f.name));const fb=cands.filter(f=>!usedNames.has(f.name));const pool=prio.length?prio:fb.length?fb:cands;const chosen=pool[Math.floor(Math.random()*pool.length)];if(chosen&&SEAFOOD_NAMES.some(s=>chosen.name?.includes(s)))seafoodCountRef.count++;if(chosen)usedNames.add(chosen.name);return chosen;}
function makeGeneralMealSlot(mealType,targetKcal,macroRatio){const carbG=Math.round(targetKcal*macroRatio.carb/4),proteinG=Math.round(targetKcal*macroRatio.protein/4),fatG=Math.round(targetKcal*macroRatio.fat/9);return{portions:[{food:{name:'🍱 일반식',category:'일반식',kcal:0,amount:0},grams:0,kcal:targetKcal,protein:proteinG,carb:carbG,fat:fatG,role:'일반식',isGeneralMeal:true}],totalKcal:targetKcal,isGeneralMeal:true};}
// ── 끼니별 식품 상한선 ─────────────────────
const PROTEIN_MAX_G=150;
const CARB_MAX_G_MAP={'오트밀':50,'귀리':50,'통밀식빵':80,'현미밥':150,'잡곡밥':150,'고구마':150,'바나나':120,'블루베리':100,'딸기':150,'키위':150};
const CARB_MAX_G_DEFAULT=150;
const VEGGIE_FIXED_G=100;
function getCarbMaxG(name){for(const[k,v]of Object.entries(CARB_MAX_G_MAP)){if((name||'').includes(k))return v;}return CARB_MAX_G_DEFAULT;}

function generateWeekMeal(calc,memberData){
  const targetCal=calc.targetCal,macroRatio=calc.macroRatio||{carb:0.40,protein:0.30,fat:0.30};
  const badWords=[...(memberData.싫어하는음식||'').split(/[,，\s]+/),...((memberData.알레르기||'')!=='없음'?(memberData.알레르기||'').split(/[,，\s]+/):[])].filter(Boolean);
  const eatOutFreq=memberData.외식빈도||'';const hasFamilyMeal=(memberData.가족식사==='예')||(memberData.가족식사||'').includes('가족');
  const needsLunchSlot=eatOutFreq.includes('주 3')||eatOutFreq.includes('주 4')||eatOutFreq.includes('주 5')||eatOutFreq.includes('매일');
  const needsDinnerSlot=hasFamilyMeal;
  const usedCarbsByMeal={아침:[],점심:[],저녁:[],간식:[]};const seafoodCountRef={count:0};const usedNames=new Set();
  const days=['월','화','수','목','금','토','일'];const mainMealTypes=['아침','점심','저녁'];const weekPlan=[];
  for(let di=0;di<7;di++){
    const dayMeals={};
    for(const mt of mainMealTypes){
      const mealKcal=Math.round(targetCal*(MEAL_RATIO_MAP[mt]||0.30));
      if(mt==='점심'&&needsLunchSlot&&di%2===0){dayMeals[mt]=makeGeneralMealSlot(mt,mealKcal,macroRatio);continue;}
      if(mt==='저녁'&&needsDinnerSlot&&di%2===1){dayMeals[mt]=makeGeneralMealSlot(mt,mealKcal,macroRatio);continue;}
      const structure=MEAL_STRUCTURE[mt]||MEAL_STRUCTURE['점심'];
      const proteinSlotRatio=structure[0]?.ratio??0.40,carbSlotRatio=structure[1]?.ratio??0.35;
      const portions=[];
      const proteinKcal=Math.round(mealKcal*proteinSlotRatio);
      const pFood=FOODS_DB.length>0?pickProteinFood(FOODS_DB,mt,badWords,usedNames,seafoodCountRef):null;
      if(pFood){const r=proteinKcal/pFood.kcal;const g=Math.min(Math.max(Math.round(r*pFood.amount/10)*10,50),PROTEIN_MAX_G);const sc=g/pFood.amount;portions.push({food:pFood,grams:g,role:'단백질',kcal:Math.round(pFood.kcal*sc),protein:Math.round(pFood.protein*sc*10)/10,carb:Math.round(pFood.carb*sc*10)/10,fat:Math.round(pFood.fat*sc*10)/10});}
      else{const pName=PRIORITY_PROTEINS[di%PRIORITY_PROTEINS.length]||'닭가슴살';portions.push({food:{name:pName},grams:100,role:'단백질',kcal:proteinKcal,protein:Math.round(proteinKcal*0.85/4),carb:2,fat:Math.round(proteinKcal*0.05/9)});}
      const carbKcal=Math.round(mealKcal*carbSlotRatio);const carbName=pickCarbFromPool(mt,usedCarbsByMeal);
      const cFood=FOODS_DB.length>0?FOODS_DB.find(f=>f.name?.includes(carbName)&&f.meals?.includes(mt)):null;
      if(cFood){const r=carbKcal/cFood.kcal;const maxG=getCarbMaxG(cFood.name);const g=Math.min(Math.max(Math.round(r*cFood.amount/10)*10,30),maxG);const sc=g/cFood.amount;portions.push({food:cFood,grams:g,role:'탄수화물',kcal:Math.round(cFood.kcal*sc),protein:Math.round(cFood.protein*sc*10)/10,carb:Math.round(cFood.carb*sc*10)/10,fat:Math.round(cFood.fat*sc*10)/10});}
      else{portions.push({food:{name:carbName},grams:130,role:'탄수화물',kcal:carbKcal,protein:Math.round(carbKcal*0.07/4),carb:Math.round(carbKcal*0.85/4),fat:Math.round(carbKcal*0.01/9)});}
      const veggieSlots=structure.slice(2);const usedVeggiesDay=new Set();
      veggieSlots.forEach((slot,si)=>{if(si===0){const vFood=pickSingleVeggie(mt,badWords,usedVeggiesDay);if(vFood){const g=VEGGIE_FIXED_G;const sc=g/vFood.amount;portions.push({food:vFood,grams:g,role:slot.role,kcal:Math.round(vFood.kcal*sc),protein:Math.round(vFood.protein*sc*10)/10,carb:Math.round(vFood.carb*sc*10)/10,fat:Math.round(vFood.fat*sc*10)/10});}else{portions.push({food:null,grams:0,role:slot.role,kcal:0,protein:0,carb:0,fat:0,isEmpty:true});}}else{portions.push({food:null,grams:0,role:slot.role,kcal:0,protein:0,carb:0,fat:0,isEmpty:true});}});
      dayMeals[mt]={portions,totalKcal:portions.reduce((s,p)=>s+p.kcal,0)};
    }
    // 간식: 3끼 실제 칼로리 합산 후 부족분 보충 (100~350kcal)
    const actual3MealKcal=mainMealTypes.reduce((s,mt)=>s+(dayMeals[mt]?.totalKcal||0),0);
    const snackTargetKcal=Math.min(Math.max(targetCal-actual3MealKcal,100),350);
    const snackStructure=MEAL_STRUCTURE['간식'];
    const snackPortions=[];
    const spFood=FOODS_DB.length>0?pickProteinFood(FOODS_DB,'간식',badWords,usedNames,seafoodCountRef):null;
    if(spFood){const snPKcal=Math.round(snackTargetKcal*(snackStructure[0]?.ratio||0.55));const r=snPKcal/spFood.kcal;const g=Math.min(Math.max(Math.round(r*spFood.amount/10)*10,30),150);const sc=g/spFood.amount;snackPortions.push({food:spFood,grams:g,role:'단백질',kcal:Math.round(spFood.kcal*sc),protein:Math.round(spFood.protein*sc*10)/10,carb:Math.round(spFood.carb*sc*10)/10,fat:Math.round(spFood.fat*sc*10)/10});}
    else{snackPortions.push({food:{name:'그릭요거트'},grams:100,role:'단백질',kcal:Math.round(snackTargetKcal*0.55),protein:Math.round(snackTargetKcal*0.55*0.65/4),carb:Math.round(snackTargetKcal*0.55*0.15/4),fat:Math.round(snackTargetKcal*0.55*0.2/9)});}
    const snCarbName=pickCarbFromPool('간식',usedCarbsByMeal);
    const scFood=FOODS_DB.length>0?FOODS_DB.find(f=>f.name?.includes(snCarbName)&&f.meals?.includes('간식')):null;
    if(scFood){const snCKcal=Math.round(snackTargetKcal*(snackStructure[1]?.ratio||0.45));const r=snCKcal/scFood.kcal;const g=Math.min(Math.max(Math.round(r*scFood.amount/10)*10,50),150);const sc=g/scFood.amount;snackPortions.push({food:scFood,grams:g,role:'과일',kcal:Math.round(scFood.kcal*sc),protein:Math.round(scFood.protein*sc*10)/10,carb:Math.round(scFood.carb*sc*10)/10,fat:Math.round(scFood.fat*sc*10)/10});}
    else{snackPortions.push({food:{name:snCarbName},grams:100,role:'과일',kcal:Math.round(snackTargetKcal*0.45),protein:1,carb:Math.round(snackTargetKcal*0.45*0.9/4),fat:0});}
    dayMeals['간식']={portions:snackPortions,totalKcal:snackPortions.reduce((s,p)=>s+p.kcal,0)};
    weekPlan.push({day:days[di],dayIndex:di+1,meals:dayMeals,mealTypes:['아침','점심','간식','저녁']});
  }
  return{weekPlan,mealTypes:['아침','점심','간식','저녁'],targetCal,generalMealGuide:GENERAL_MEAL_GUIDE,hasGeneralMealSlots:needsLunchSlot||needsDinnerSlot};
}

function resolveStretching(d){const act=d.운동종류||'',job=d.직장형태||'',steps=d.걸음수||'';const bmi=(d.키&&d.현재체중)?d.현재체중/((d.키/100)**2):0;if(act.includes('러닝')||act.includes('달리기'))return STRETCHING_VIDEOS.running;if(job.includes('사무')||d.앉아있는시간?.includes('10시간'))return STRETCHING_VIDEOS.upper;if(steps.includes('8,000')||steps.includes('10,000')||bmi>=25)return STRETCHING_VIDEOS.lower;return STRETCHING_VIDEOS.daily;}

  document.getElementById('macro-section').innerHTML=`<div class="macro-bar"><div class="bar-p" style="width:${calc.proteinPct}%"></div><div class="bar-c" style="width:${calc.carbPct}%"></div><div class="bar-f" style="width:${calc.fatPct}%"></div></div><div class="macro-legend"><span><span class="dot" style="background:var(--pink)"></span>단백질 ${calc.protein}g (${calc.proteinPct}%)</span><span><span class="dot" style="background:#F4C0D1"></span>탄수화물 ${calc.carb}g (${calc.carbPct}%)</span><span><span class="dot" style="background:#FAC775"></span>지방 ${calc.fat}g (${calc.fatPct}%)</span></div><div style="margin-top:10px;font-size:12px;color:var(--text3);">활동계수 ${calc.totalFactor} · ${calc.safetyFlag?'⚠️ Safety Flag ON':'Safety Flag OFF'} · ${calc.userType}</div>`;

  // 미션 렌더링
  const weekHtml=missions.weeks.map(w=>{
    const m1=w.mission1,m2=w.mission2;
    const dailyBoxes=w.dailyMissions.map(dm=>`<div class="daily-box ${dm.isBodyCheck?'body-check':''}"><div class="daily-day">${dm.dayLabel}</div><div class="daily-num">Day${dm.dayNum}</div><div class="daily-txt">${dm.text}</div></div>`).join('');

  }).join('');
  document.getElementById('mission-section').innerHTML=weekHtml;

  // 식단 렌더링
  const catColor={'단백질':'#FFF0F5','육류':'#FCE4EC','해산물':'#E0F7FA','탄수화물':'#FFF8E1','곡류':'#FFFDE7','채소':'#F1F8E9','과일':'#F9FBE7','유제품':'#E3F2FD','지방':'#FFF3E0','야채':'#F1F8E9'};
  // 저장된 플랜(foodName)과 실시간 생성(food.name) 모두 대응
  function getFoodName(p){ return p.foodName || p.food?.name || ''; }
  function getFoodCategory(p){ return p.food?.category || ''; }
  function getFoodUnit(p){ return p.food?.unit || 'g'; }
  let mealHtml=mealPlan.weekPlan.map((day,di)=>{
    const totalKcal=Object.values(day.meals).reduce((s,m)=>s+m.totalKcal,0);
    const mealsHtml=day.mealTypes.map(mt=>{
      const meal=day.meals[mt];
      if(meal.isGeneralMeal){const p=meal.portions[0];return`<div class="meal-row"><span class="meal-type">${mt}</span><span><span style="background:#FFF8E6;border:1.5px dashed #F4A93C;border-radius:6px;padding:3px 8px;font-size:12px;">🍱 일반식 — ${p.carb}g·${p.protein}g·${p.fat}g</span></span><span class="meal-kcal">${p.kcal}kcal</span></div>`;}
      const foodsStr=meal.portions.map(p=>{
        if(p.isEmpty)return'';
        const name=getFoodName(p);
        if(!name)return'';
        const bg=catColor[getFoodCategory(p)]||'#F5F5F5';
        const g=p.grams?` ${p.grams}${getFoodUnit(p)}`:'';
        return`<span style="background:${bg};padding:2px 7px;border-radius:10px;font-size:12px;margin-right:4px;display:inline-block;margin-bottom:3px;">${name}${g}</span>`;
      }).join('');
      return`<div class="meal-row"><span class="meal-type">${mt}</span><span>${foodsStr}</span><span class="meal-kcal">${meal.totalKcal}kcal</span></div>`;
    }).join('');
    return`<div class="day-block"><div class="day-head" onclick="toggleBlock(this)"><div class="day-head-left">Day ${day.dayIndex} (${day.day})</div><div style="display:flex;align-items:center;gap:10px;"><span class="day-kcal">${totalKcal}kcal</span><span style="font-size:12px;color:var(--text3);">▼</span></div></div><div class="day-meals ${di===0?'open':''}">${mealsHtml}</div></div>`;
  }).join('');
  mealHtml+=`<div class="free-box"><div class="free-title">🟡 자유식 가이드 (주 1회, 1끼)</div><div class="free-list">1. 단백질 메뉴 먼저 — 고기·생선·두부 중 하나 필수<br>2. 음료는 물 또는 제로음료<br>3. 탄수화물 + 지방 과다 조합 피하기<br>4. 다음 끼니 굶지 않기 — 정상식 복귀</div></div>`;
  document.getElementById('meal-section').innerHTML=mealHtml;

  // 운동 렌더링
  const typeLabel={tabata:'타바타',lower:'하체',upper:'상체',core:'코어',strength:'전신근력',stretch:'스트레칭'};
  const typeClass={tabata:'wt-tabata',lower:'wt-lower',upper:'wt-upper',core:'wt-core',strength:'wt-strength',stretch:'wt-stretch'};
  document.getElementById('workout-level-label').textContent=`${plan.level} 기준 · 주 5회 운동 + 2회 스트레칭/휴식`;
  document.getElementById('workout-legend').innerHTML=Object.entries(typeLabel).map(([t,l])=>`<span class="workout-badge ${typeClass[t]}">${l}</span>`).join('');
  const dayKeys=['mon','tue','wed','thu','fri','sat','sun'],dayL=['월','화','수','목','금','토','일'];
  document.getElementById('workout-section').innerHTML=plan.weeks.map((w,wi)=>`<div class="workout-week"><div class="workout-head" onclick="toggleBlock(this)"><span>${wi+1}주차</span><span style="font-size:12px;color:var(--text3);">▼</span></div><div class="workout-body ${wi===0?'open':''}">${dayKeys.map((dk,di)=>{const vid=videoMap[w[dk]];if(!vid)return`<div class="workout-day"><span class="workout-day-label">${dayL[di]}</span><span class="wt-rest">휴식</span></div>`;return`<div class="workout-day"><span class="workout-day-label">${dayL[di]}</span><span class="workout-badge ${typeClass[vid.type]}">${typeLabel[vid.type]}</span><a href="${vid.url}" target="_blank" class="workout-link has-url">▶ ${vid.label}</a></div>`;}).join('')}</div></div>`).join('');

  document.getElementById('loading').style.display='none';
  document.getElementById('main').style.display='block';
}

async function init(){
  const params=new URLSearchParams(location.search);
  const memberId=params.get('memberId');
  if(!memberId){document.getElementById('loading').innerHTML='<span style="font-size:32px">😅</span><br>잘못된 링크예요. 코치에게 문의해주세요.';return;}
  try{
    await loadFoodsDB();

    // 1. 저장된 코칭 플랜 우선 시도
    const planRes=await fetch(`/api/get-plan?memberId=${memberId}`);
    if(planRes.ok){
      const{success,plan}=await planRes.json();
      if(success&&plan){
        // 저장된 플랜 사용 (코치가 수정한 값 그대로)
        const surveyRes=await fetch(`/api/member-data?memberId=${memberId}`);
        const{data}=await surveyRes.json();
        renderFromSavedPlan(data, plan);
        return;
      }
    }

    // 2. 저장된 플랜 없으면 설문 데이터로 재생성
    const res=await fetch(`/api/member-data?memberId=${memberId}`);
    if(!res.ok)throw new Error('데이터 없음');
    const{data}=await res.json();
    if(!data||!data.이름)throw new Error('설문 데이터가 없습니다');
    renderAll(data);
  }catch(e){document.getElementById('loading').innerHTML=`<span style="font-size:32px">😅</span><br>데이터를 불러올 수 없어요.<br><span style="font-size:12px;color:var(--text3);">${e.message}</span>`;}
}

// 저장된 플랜 데이터로 렌더링 (코치 수정사항 반영)
function renderFromSavedPlan(d, plan){
  const {calc, missions, mealPlan, workout} = plan;
  const workoutPlan = WORKOUT_PLANS[calc.workoutLevel];
  const videoMap = buildVideoMap(d);
  renderAll(d, calc, missions, mealPlan, {level: workoutPlan.level, weeks: workoutPlan.weeks, ...workout});
}
init();
</script>
