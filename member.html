<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라라어트 코칭 플랜</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:#D4537E; --pink-light:#FBEAF0; --pink-dark:#993556;
    --cream:#FAF7F2; --border:#E8DDD0; --text:#2C1810;
    --text2:#7A5C4E; --text3:#A8927F;
    --green:#3B6D11; --green-bg:#EAF3DE;
    --blue:#185FA5; --blue-bg:#E6F1FB;
    --amber:#854F0B; --amber-bg:#FAEEDA;
    --red:#A32D2D; --red-bg:#FCEBEB;
    --purple:#534AB7; --purple-bg:#F4EEFE;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--cream); color:var(--text); min-height:100vh; }

  header { background:white; border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .logo { font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--text); font-style:italic; }
  .logo span { font-style:normal; font-size:11px; color:var(--text3); display:block; letter-spacing:0.1em; }

  .container { max-width:860px; margin:0 auto; padding:28px 20px 60px; }

  .loading { text-align:center; padding:80px 20px; color:var(--text3); font-size:15px; }
  .loading .spin { font-size:32px; display:block; margin-bottom:12px; animation:spin 1.5s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* 회원 헤더 */
  .member-hero { background:white; border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:24px; display:flex; align-items:center; gap:18px; }
  .avatar { width:56px; height:56px; border-radius:50%; background:var(--pink-light); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:600; color:var(--pink); flex-shrink:0; }
  .hero-info .name { font-size:20px; font-weight:600; margin-bottom:4px; }
  .hero-info .sub { font-size:13px; color:var(--text3); }
  .tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .tag { font-size:11px; padding:3px 12px; border-radius:20px; }

  /* 탭 */
  .tabs { display:flex; gap:8px; margin-bottom:20px; overflow-x:auto; padding-bottom:4px; }
  .tab { padding:9px 20px; border-radius:20px; border:1px solid var(--border); background:white; color:var(--text2); font-size:13px; cursor:pointer; white-space:nowrap; transition:all 0.2s; flex-shrink:0; }
  .tab.on { background:var(--pink); color:white; border-color:var(--pink); font-weight:500; }
  .tab-content { display:none; }
  .tab-content.on { display:block; }

  /* 카드 */
  .card { background:white; border:1px solid var(--border); border-radius:12px; padding:20px 24px; margin-bottom:16px; }
  .card-title { font-size:11px; letter-spacing:0.12em; color:var(--text3); margin-bottom:14px; font-weight:500; }

  /* 칼로리 */
  .cal-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .cal-box { background:var(--cream); border-radius:10px; padding:16px; text-align:center; }
  .cal-box.highlight { background:var(--pink-light); border:1px solid var(--pink); }
  .cal-label { font-size:11px; color:var(--text3); margin-bottom:6px; }
  .cal-val { font-size:24px; font-weight:600; color:var(--text); }
  .cal-val.pink { color:var(--pink); }
  .cal-val span { font-size:13px; font-weight:400; color:var(--text3); }

  /* 탄단지 바 */
  .macro-bar { height:10px; border-radius:5px; overflow:hidden; background:var(--border); display:flex; margin:12px 0 8px; }
  .bar-p { background:var(--pink); }
  .bar-c { background:#F4C0D1; }
  .bar-f { background:#FAC775; }
  .macro-legend { display:flex; gap:16px; font-size:12px; color:var(--text2); flex-wrap:wrap; }
  .dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }

  /* 미션 */
  .week-block { border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:14px; }
  .week-head { background:var(--pink-light); padding:12px 18px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
  .week-num { font-weight:600; font-size:15px; color:var(--pink-dark); }
  .week-theme { font-size:12px; color:var(--pink); }
  .week-body { padding:14px 18px; display:none; }
  .week-body.open { display:block; }
  .chevron { font-size:12px; color:var(--pink); transition:transform 0.2s; }
  .chevron.open { transform:rotate(180deg); }

  .mission-row { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid #f0e8e0; align-items:flex-start; }
  .mission-row:last-child { border-bottom:none; }
  .mbadge { font-size:11px; padding:3px 10px; border-radius:12px; flex-shrink:0; margin-top:1px; }
  .mbadge-w { background:var(--pink-light); color:var(--pink-dark); }
  .mbadge-df { background:var(--green-bg); color:var(--green); }
  .mbadge-day { background:var(--blue-bg); color:var(--blue); font-size:10px; }
  .mission-txt { font-size:13px; color:var(--text); line-height:1.6; }
  .mission-txt a { color:var(--pink); font-weight:500; }

  .daily-section { margin-top:14px; }
  .daily-title { font-size:11px; color:var(--text3); letter-spacing:0.08em; margin-bottom:8px; }
  .daily-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .daily-box { background:var(--cream); border:1px solid var(--border); border-radius:8px; padding:7px 5px; text-align:center; }
  .daily-box.body-check { background:var(--pink-light); border-color:var(--pink); }
  .daily-day { font-size:10px; color:var(--pink); font-weight:600; margin-bottom:3px; }
  .daily-box.body-check .daily-day { color:var(--pink-dark); }
  .daily-num { font-size:9px; color:var(--text3); margin-bottom:4px; }
  .daily-txt { font-size:10px; color:var(--text); line-height:1.4; }

  /* 식단 */
  .day-block { border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:10px; }
  .day-head { background:var(--cream); padding:10px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
  .day-head-left { font-weight:600; font-size:14px; }
  .day-kcal { font-size:12px; color:var(--text3); }
  .day-meals { display:none; }
  .day-meals.open { display:block; }
  .meal-row { display:grid; grid-template-columns:52px 1fr auto; gap:10px; padding:9px 16px; border-top:1px solid #f0e8e0; font-size:13px; align-items:center; }
  .meal-type { color:var(--text3); font-size:12px; }
  .meal-kcal { color:var(--pink); font-size:12px; }

  .free-box { background:var(--amber-bg); border:1px solid #FAC775; border-radius:10px; padding:14px 16px; margin-top:8px; }
  .free-title { font-size:13px; font-weight:600; color:var(--amber); margin-bottom:8px; }
  .free-list { font-size:12px; color:#633806; line-height:2.1; }

  /* 운동 */
  .workout-week { border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:12px; }
  .workout-head { background:var(--cream); padding:12px 18px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-weight:600; }
  .workout-body { display:none; }
  .workout-body.open { display:block; }
  .workout-day { display:flex; align-items:center; gap:12px; padding:10px 18px; border-top:1px solid #f0e8e0; }
  .workout-day-label { font-size:12px; color:var(--text3); width:24px; flex-shrink:0; }
  .workout-badge { font-size:11px; padding:2px 8px; border-radius:6px; flex-shrink:0; }
  .wt-tabata { background:var(--red-bg); color:var(--red); }
  .wt-lower { background:var(--pink-light); color:var(--pink-dark); }
  .wt-upper { background:var(--amber-bg); color:var(--amber); }
  .wt-core { background:var(--purple-bg); color:var(--purple); }
  .wt-strength { background:var(--blue-bg); color:var(--blue); }
  .wt-stretch { background:var(--green-bg); color:var(--green); }
  .wt-rest { color:var(--text3); font-size:12px; }
  .workout-link { font-size:12px; color:var(--text3); text-decoration:none; }
  .workout-link:hover { color:var(--pink); }
  .workout-link.has-url { color:var(--pink); font-weight:500; }

  .legend { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }

  @media (max-width:600px) {
    .cal-grid { grid-template-columns:1fr 1fr; }
    .daily-grid { grid-template-columns:repeat(4,1fr); }
    .member-hero { flex-direction:column; align-items:flex-start; }
    header { padding:14px 16px; }
    .container { padding:16px 12px 60px; }
  }

  /* ── 일반식 슬롯 ── */
.general-meal-slot {
  background: #FFF8E6;
  border: 1.5px dashed #F4A93C;
  border-radius: 8px;
  padding: 10px 12px;
  margin: 6px 0;
}
.portion-guide-hint {
  display: block;
  font-size: 11px;
  color: #F4A93C;
  margin-top: 4px;
}
/* ── 일반식 가이드 박스 ── */
.general-meal-guide-box {
  background: #FFF8E6;
  border: 1px solid #F4A93C;
  border-radius: 10px;
  padding: 14px 16px;
  margin-top: 20px;
}
.guide-title {
  font-weight: 700;
  font-size: 14px;
  color: #C47A15;
  margin-bottom: 8px;
}
.guide-list {
  list-style: none;
  padding: 0;
  margin: 0 0 10px 0;
  font-size: 13px;
  color: #555;
  line-height: 1.8;
}
.guide-links {
  font-size: 12px;
  color: #888;
}
.guide-links a {
  color: #E8832A;
  text-decoration: underline;
}
</style>
</head>
<body>

<header>
  <div class="logo">rara diet <span>MY COACHING PLAN</span></div>
  <div style="font-size:12px;color:var(--text3);">라라어트</div>
</header>

<div class="container">
  <div class="loading" id="loading">
    <span class="spin">🌸</span>
    코칭 플랜을 불러오는 중이에요...
  </div>

  <div id="main" style="display:none;">
    <div class="member-hero">
      <div class="avatar" id="avatar"></div>
      <div class="hero-info">
        <div class="name" id="hero-name"></div>
        <div class="sub" id="hero-sub"></div>
        <div class="tags" id="hero-tags"></div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab on" onclick="showTab('summary',this)">📊 목표 칼로리</div>
      <div class="tab" onclick="showTab('mission',this)">📋 4주 미션</div>
      <div class="tab" onclick="showTab('meal',this)">🥗 식단표</div>
      <div class="tab" onclick="showTab('workout',this)">🏋️ 운동 플랜</div>
    </div>

    <!-- 요약 -->
    <div class="tab-content on" id="tab-summary">
      <div class="card">
        <div class="card-title">목표 칼로리</div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div class="card">
        <div class="card-title">탄단지 분배</div>
        <div id="macro-section"></div>
      </div>
    </div>

    <!-- 미션 -->
    <div class="tab-content" id="tab-mission">
      <div id="mission-section"></div>
    </div>

    <!-- 식단 -->
    <div class="tab-content" id="tab-meal">
      <div style="font-size:12px;color:var(--text3);margin-bottom:14px;">각 날짜를 눌러 식단을 확인하세요. 1-2주차, 3-4주차 동일하게 반복돼요.</div>
      <div id="meal-section"></div>
    </div>

    <!-- 운동 -->
    <div class="tab-content" id="tab-workout">
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px;" id="workout-level-label"></div>
      <div class="legend" id="workout-legend"></div>
      <div id="workout-section"></div>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────
// 계산 엔진 (index.html과 동일)
// ──────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════
// 라라어트 계산 엔진 v2.0
// 적용: 식단 칼로리 계산 규칙 v1.0
// 수정 대상: index.html / member.html 의 calcBMR ~ calcAll 함수 블록 전체 교체
// ══════════════════════════════════════════════════════════════════════

// ── 1. BMR 계산 ───────────────────────────────────────────────────────
// 인바디(Katch-McArdle) 우선, 없으면 Harris-Benedict
function calcBMR(d) {
  if (d.골격근량 && d.체지방량) {
    const ffm = d.현재체중 - d.체지방량;
    return Math.round(370 + 21.6 * ffm);
  }
  if (d.성별 === '여성')
    return Math.round(655.0955 + 9.5634 * d.현재체중 + 1.8496 * d.키 - 4.6756 * d.나이);
  return Math.round(66.4730 + 13.7516 * d.현재체중 + 5.0033 * d.키 - 6.7550 * d.나이);
}

// ── 2. 활동계수 계산 ──────────────────────────────────────────────────
// 평소활동량 + 걸음수/앉아있는시간 보정 + 운동 기여도(EA)
// 최종 범위: 1.20 ~ 1.70
function calcActivityFactor(d) {
  const actMap = {
    '매우 적음 (주로 앉아서 생활)': 1.20,
    '보통 (가끔 걷는 편)':           1.35,
    '많은 편 (활동량 많음)':          1.50,
  };
  let af = actMap[d.평소활동량] || 1.30;

  if (d.걸음수?.includes('3,000보 미만'))                             af -= 0.03;
  else if (d.걸음수?.includes('8,000') || d.걸음수?.includes('10,000')) af += 0.05;
  if (d.앉아있는시간?.includes('10시간'))                              af -= 0.02;

  // 운동 기여도
  if (d.운동여부 !== '안 함') {
    const freqMap = { '주 1회': 1, '주 2회': 1, '주 3회': 2, '주 4회': 2, '주 5회 이상': 3 };
    const durMap  = { '30분 이내': 1, '30~60분': 2, '60~90분': 3, '90분 이상': 3 };
    const intMap  = { '가볍게 (땀 거의 안 남)': 1, '보통 (땀이 남)': 2, '강하게 (숨 많이 참)': 3 };
    const score = (freqMap[d.운동빈도] || 0) + (durMap[d.운동시간] || 1) + (intMap[d.운동강도] || 1);
    if      (score <= 2) af += 0;
    else if (score <= 4) af += 0.05;
    else if (score <= 6) af += 0.10;
    else if (score <= 8) af += 0.15;
    else                 af += 0.20;
  }

  return Math.min(Math.max(Math.round(af * 100) / 100, 1.20), 1.70);
}

// ── 3. 위험도 계산 (각 0~2 정규화) ──────────────────────────────────
function calcDietRisk(d) {
  let n = 0;
  if (d.외식빈도?.includes('거의 매일') || d.외식빈도?.includes('주 4') || d.외식빈도?.includes('주 5')) n++;
  if (d.폭식?.includes('자주') || d.폭식?.includes('가끔'))                                               n++;
  if (d.야식 === '있음')                                                                                   n++;
  if (d.식사규칙성?.includes('불규칙') || d.식사시간?.includes('불규칙'))                                  n++;
  if (d.단백질섭취빈도?.includes('거의') || d.단백질섭취빈도?.includes('1회'))                             n++;
  return n <= 1 ? 0 : n === 2 ? 1 : 2;
}

function calcRecoveryRisk(d) {
  let n = 0;
  if (d.수면시간 === '5시간 미만' || d.수면시간 === '5~6시간') n++;
  if (d.수면질 && d.수면질 <= 2)                               n++;
  if (d.스트레스 && d.스트레스 >= 4)                           n++;
  else if (d.스트레스 && d.스트레스 >= 3)                      n++;
  if (d.피로도 && d.피로도 >= 4)                               n++;
  return n <= 1 ? 0 : n === 2 ? 1 : 2;
}

function calcHormoneRisk(d) {
  if (d.성별 !== '여성') return 0;
  let n = 0;
  if (d.PMS === '심한 편' || d.PMS === '약간 있음')             n++;
  if (d.생리주기규칙성 === '불규칙')                             n++;
  if (d.붓기?.includes('심'))                                    n++;
  if (d.생리중운동 === '거의 불가능')                            n++;
  if (d.저탄수반응?.includes('저하') || d.저탄수반응?.includes('힘듦')) n++;
  return n <= 1 ? 0 : n === 2 ? 1 : 2;
}

// ── 4. 목표 유형 파싱 ─────────────────────────────────────────────────
function parseGoalType(d) {
  const g = d.목표 || '';
  if (g.includes('근육') || g.includes('증량'))                 return 'gain';
  if (g.includes('유지'))                                        return 'maintenance';
  if (g.includes('보수') || g.includes('천천히') || g.includes('서서히')) return 'conservative_cut';
  return 'general_cut';
}

// ── 5. 탄단지 비율 프로필 선택 ────────────────────────────────────────
// 합계가 1.0이 되도록 fat을 조정
function selectMacroProfile(goalType, af, hormoneRisk, d) {
  if (goalType === 'gain')
    return { carb: 0.475, protein: 0.275, fat: 0.25, label: '증량형' };
  if (af >= 1.50 || d.운동빈도?.includes('주 4') || d.운동빈도?.includes('주 5'))
    return { carb: 0.50,  protein: 0.30,  fat: 0.20, label: '운동수행형' };
  if (hormoneRisk >= 2 || d.폭식?.includes('자주'))
    return { carb: 0.375, protein: 0.30,  fat: 0.325, label: '호르몬민감형' };
  return   { carb: 0.40,  protein: 0.30,  fat: 0.30,  label: '일반감량형' };
}

// ── 6. 끼니 분배 선택 ────────────────────────────────────────────────
function selectMealDist(d) {
  const binge    = d.폭식?.includes('자주') || d.폭식?.includes('가끔');
  const lateNight = d.야식 === '있음';
  const eatOut   = d.외식빈도?.includes('주 3') || d.외식빈도?.includes('주 4') || d.외식빈도?.includes('거의 매일');
  if (binge || lateNight)
    return { type: '야식/폭식위험형', breakfast: 0.25, lunch: 0.30, snack: 0.10, dinner: 0.35 };
  if (eatOut)
    return { type: '외식포함형',      breakfast: 0.25, lunch: 0.40, dinner: 0.35 };
  return           { type: '기본3끼',      meal1: 0.30,    meal2: 0.35,  meal3: 0.35 };
}

// ── 7. 메인 계산 함수 ─────────────────────────────────────────────────
function calcAll(d) {
  const bmr         = calcBMR(d);
  const totalFactor = calcActivityFactor(d);
  const tdee        = Math.round(bmr * totalFactor);

  const dietRisk     = calcDietRisk(d);
  const recoveryRisk = calcRecoveryRisk(d);
  const hormoneRisk  = calcHormoneRisk(d);
  const riskSum      = dietRisk + recoveryRisk + hormoneRisk;

  const goalType = parseGoalType(d);

  // 기본 적자/적립
  const baseOffset = { conservative_cut: -350, general_cut: -550, maintenance: 0, gain: +200 }[goalType];

  // 위험도 보정 (적자 완화 = kcal 환원)
  let riskAdjust = 0;
  if      (riskSum >= 4) riskAdjust += 200;
  else if (riskSum >= 2) riskAdjust += 100;
  if (dietRisk     >= 2) riskAdjust += 100;
  if (recoveryRisk >= 2) riskAdjust += 100;
  if (hormoneRisk  >= 2) riskAdjust += 100;

  // safetyFlag: 공격 감량 금지 조건
  const safetyFlag =
    hormoneRisk >= 2 || recoveryRisk >= 2 ||
    d.생리주기규칙성 === '불규칙' ||
    d.폭식?.includes('자주') ||
    d.수면시간 === '5시간 미만';

 // 최종 targetCal — 적용 우선순위:
  // 1) 기본 계산 → 2) 위험도 보정 → 3) BMR 하한선 → 4) 감량 최소선 상한
  let targetCal = Math.round(tdee + baseOffset + riskAdjust);

  // [3] BMR 하한선
  targetCal = Math.max(targetCal, bmr);

  // [4] 감량 최소선 제한
  const MIN_DEFICIT = 200;
  if (goalType === 'conservative_cut' || goalType === 'general_cut') {
    targetCal = Math.min(targetCal, tdee - MIN_DEFICIT);
  }

  // 탄단지 비율 선택 및 환산
  const macro   = selectMacroProfile(goalType, totalFactor, hormoneRisk, d);
  const protein = Math.round(targetCal * macro.protein / 4);
  const fat     = Math.max(Math.round(targetCal * macro.fat / 9), 40);
  const carb    = Math.max(Math.round(targetCal * macro.carb / 4), 50);

  const proteinPct = Math.round(protein * 4 / targetCal * 100);
  const fatPct     = Math.round(fat * 9    / targetCal * 100);
  const carbPct    = 100 - proteinPct - fatPct;

  // 운동 레벨
  const freqMap2 = { '주 1회': 1, '주 2회': 2, '주 3회': 3, '주 4회': 4, '주 5회 이상': 5 };
  const freq = freqMap2[d.운동빈도] || 0;
  let workoutLevel = 'beginner';
  if (d.운동여부 === '안 함') workoutLevel = 'beginner';
  else if (freq >= 4)         workoutLevel = 'advanced';
  else if (freq >= 2)         workoutLevel = 'intermediate';

  // 회원 유형
  let userType = '균형형';
  if      (dietRisk >= 2 && freq <= 1) userType = '저활동-식습관위험형';
  else if (freq >= 3 && dietRisk >= 1) userType = '운동하지만정체형';
  else if (recoveryRisk >= 2)          userType = '생활리듬붕괴형';
  else if (hormoneRisk >= 2)           userType = '호르몬민감형';
  else if (goalType === 'gain')        userType = '체형개선형';

  const mealDist = selectMealDist(d);

  return {
    bmr, tdee, targetCal,
    totalFactor: totalFactor.toFixed(2),
    protein, fat, carb,
    proteinPct, fatPct, carbPct,
    dietRisk, recoveryRisk, hormoneRisk, riskSum,
    riskAdjust, safetyFlag,
     goalType, macroLabel: macro.label,
    macroRatio: { carb: macro.carb, protein: macro.protein, fat: macro.fat },
    workoutLevel, userType,
    mealDist,
  };
}

const FOOD_SUBSTITUTE={'닭가슴살':'두부','닭':'두부','연어':'참치','소고기':'두부구이','달걀':'두부스크램블','유제품':'두유','우유':'두유','그릭요거트':'두유','견과류':'방울토마토','아보카도':'삶은감자','통밀':'쌀밥','식빵':'고구마','빵':'고구마'};
function filterFood(str,exKw){
  if(!exKw||!exKw.length)return str;
  let r=str;
  for(const kw of exKw){if(r.includes(kw))r=r.replace(new RegExp(kw,'g'),FOOD_SUBSTITUTE[kw]||'채소');}
  return r;
}
function scaleMeals(meals,targetCal){
  const base=meals.reduce((s,m)=>s+m.kcal,0);
  if(!base)return meals;
  const scale=targetCal/base;
  return meals.map(m=>({...m,kcal:Math.round(m.kcal*scale),foods:m.foods+(scale<0.85&&(m.type==='점심'||m.type==='저녁')?' (소량)':scale>1.15&&(m.type==='점심'||m.type==='저녁')?' (넉넉히)':'')}));
}

// ── 규칙 2: 단백질 우선순위 + 해산물 제한 ──────────────────────────────
const PRIORITY_PROTEINS = ['닭가슴살', '닭안심', '돼지안심', '소고기우둔살', '틸라피아', '두부', '계란'];

const GENERAL_MEAL_GUIDE = `🍱 일반식 선택 가이드
• 서브웨이 15cm 터키/치킨: 약 350~380kcal, 단백질 25~30g (소스는 머스타드·식초만)

📱 칼로리 확인: 칼로리코치 앱 / 다이어트신(dietshin.com) / 식품안전나라`;

// ── 내부 유틸: 야채 조합 선택 ────────────────────────────────────────────
function pickVeggieCombo(badWords, usedCombos) {
  const available = VEGGIE_COMBOS.filter(c => {
    const key = c.names.join(',');
    if (usedCombos.has(key)) return false;
    return !c.names.some(n => badWords.some(b => b && n.includes(b)));
  });
  const pool = available.length ? available : VEGGIE_COMBOS;
  const combo = pool[Math.floor(Math.random() * pool.length)];
  usedCombos.add(combo.names.join(','));
  return combo;
}

// ── 내부 유틸: 탄수 선택 (끼니별 풀 + 7일 반복 제한) ─────────────────────
function pickCarbFromPool(mealType, usedCarbsByMeal) {
  const pool  = CARB_POOLS[mealType] || CARB_POOLS['아침'];
  const limit = CARB_POOL_LIMIT[mealType] || 3;
  const used  = usedCarbsByMeal[mealType] || [];

  // 사용 횟수가 limit 이내인 것 우선; 초과하면 pool 전체에서 랜덤
  const available = pool.filter(c => used.filter(u => u === c).length < Math.ceil(7 / limit));
  const chosen = available.length
    ? available[Math.floor(Math.random() * available.length)]
    : pool[Math.floor(Math.random() * pool.length)];

  usedCarbsByMeal[mealType] = [...used, chosen];
  return chosen;
}

// ── 내부 유틸: 단백질 선택 (우선순위 + 해산물 제한) ──────────────────────
function pickProteinFood(FOODS_DB, mealType, badWords, usedNames, seafoodCountRef) {
  const isSeafoodAllowed = seafoodCountRef.count < MAX_SEAFOOD_PER_WEEK;

  // 1) FOODS_DB에서 단백질 카테고리 후보 추출
  const candidates = FOODS_DB.filter(f => {
    if (!f.meals?.includes(mealType)) return false;
    const cat = (f.category || '').toLowerCase();
    if (!cat.includes('단백') && !cat.includes('protein')) return false;
    if (badWords.some(b => b && f.name?.includes(b))) return false;

    const isSeafood = SEAFOOD_NAMES.some(s => f.name?.includes(s));
    if (isSeafood && !isSeafoodAllowed) return false;
    return true;
  });

  if (!candidates.length) return null;

  // 2) 우선순위 단백질 먼저 시도 (아직 덜 쓴 것)
  const prioritized = candidates.filter(f =>
    PRIORITY_PROTEINS.some(p => f.name?.includes(p)) && !usedNames.has(f.name)
  );
  const fallback = candidates.filter(f => !usedNames.has(f.name));
  const pool = prioritized.length ? prioritized : fallback.length ? fallback : candidates;

  const chosen = pool[Math.floor(Math.random() * pool.length)];

  // 해산물이면 카운터 증가
  if (chosen && SEAFOOD_NAMES.some(s => chosen.name?.includes(s))) {
    seafoodCountRef.count++;
  }
  if (chosen) usedNames.add(chosen.name);
  return chosen;
}

function makeGeneralMealSlot(mealType, targetKcal, macroRatio) {
  const carbG    = Math.round(targetKcal * macroRatio.carb / 4);
  const proteinG = Math.round(targetKcal * macroRatio.protein / 4);
  const fatG     = Math.round(targetKcal * macroRatio.fat / 9);
  return {
    portions: [{
      food:      { name: '🍱 일반식', category: '일반식', kcal: 0, amount: 0 },
      grams:     0,
      kcal:      targetKcal,
      protein:   proteinG,
      carb:      carbG,
      fat:       fatG,
      role:      '일반식',
      isGeneralMeal: true,
      guideText: GENERAL_MEAL_GUIDE,
    }],
    totalKcal:     targetKcal,
    isGeneralMeal: true,
  };
}

function generateWeekMeal(calc, memberData) {
  const targetCal   = calc.targetCal;
  const macroRatio  = calc.macroRatio || { carb: 0.40, protein: 0.30, fat: 0.30 };
  const badWords    = [
    ...(memberData.싫어하는음식 || '').split(/[,，\s]+/),
    ...((memberData.알레르기 || '') !== '없음'
      ? (memberData.알레르기 || '').split(/[,，\s]+/) : [])
  ].filter(Boolean);

  const 식사횟수  = memberData.식사횟수 || '3끼';
  const mealTypes = 식사횟수 === '4끼 이상'
    ? ['아침', '점심', '간식', '저녁']
    : ['아침', '점심', '저녁'];

  // 일반식 슬롯 적용 조건
  const eatOutFreq   = memberData.외식빈도 || '';
  const hasFamilyMeal = (memberData.가족식사 === '예') || (memberData.가족식사 || '').includes('가족');
  const needsLunchSlot  = eatOutFreq.includes('주 3') || eatOutFreq.includes('주 4')
                        || eatOutFreq.includes('주 5') || eatOutFreq.includes('매일');
  const needsDinnerSlot = hasFamilyMeal;

  // 추적 변수
  const usedCarbsByMeal = { 아침: [], 점심: [], 저녁: [], 간식: [] };
  const seafoodCountRef = { count: 0 };
  const usedCombos      = new Set();
  const usedNames       = new Set();

  const MEAL_RATIO_MAP = {
    아침: 0.30, 점심: 0.35, 저녁: 0.35, 간식: 0.10,
  };

  const days    = ['월', '화', '수', '목', '금', '토', '일'];
  const weekPlan = [];

  for (let di = 0; di < 7; di++) {
    const dayMeals = {};

    for (const mt of mealTypes) {
      const mealKcal = Math.round(targetCal * (MEAL_RATIO_MAP[mt] || 0.30));

      // ── 규칙 4: 일반식 슬롯 처리 ────────────────────────────────
      if (mt === '점심' && needsLunchSlot && di % 2 === 0) {
        // 격일로 일반식 슬롯 배치 (주 3~4회 외식 빈도에 맞게)
        dayMeals[mt] = makeGeneralMealSlot(mt, mealKcal, macroRatio);
        continue;
      }
      if (mt === '저녁' && needsDinnerSlot && di % 2 === 1) {
        dayMeals[mt] = makeGeneralMealSlot(mt, mealKcal, macroRatio);
        continue;
      }

      // ── 일반 슬롯 조립 ──────────────────────────────────────────
      // ⚠️ push 순서 = MEAL_STRUCTURE 순서와 반드시 일치
      //   [0] 단백질  [1] 탄수화물  [2] 야채
      // openSwap(roleIdx) 이 MEAL_STRUCTURE[mealType][roleIdx].cats 로
      // 교체 카테고리를 찾으므로, 순서 틀리면 버튼이 잘못 동작함
      const portions = [];

      // ── [0] 단백질 슬롯 ─────────────────────────────────────────
      const proteinKcal = Math.round(mealKcal * macroRatio.protein);
      const proteinFood = (typeof FOODS_DB !== 'undefined')
        ? pickProteinFood(FOODS_DB, mt, badWords, usedNames, seafoodCountRef)
        : null;

      if (proteinFood) {
        const r = proteinKcal / proteinFood.kcal;
        const g = Math.min(Math.max(Math.round(r * proteinFood.amount / 10) * 10, 50), 200);
        const scale = g / proteinFood.amount;
        portions.push({
          food: proteinFood, grams: g, role: '단백질',
          kcal:    Math.round(proteinFood.kcal    * scale),
          protein: Math.round(proteinFood.protein * scale * 10) / 10,
          carb:    Math.round(proteinFood.carb    * scale * 10) / 10,
          fat:     Math.round(proteinFood.fat     * scale * 10) / 10,
        });
      } else {
        const fallbackProteins = PRIORITY_PROTEINS.filter(p =>
          !usedNames.has(p) && !badWords.some(b => b && p.includes(b))
        );
        const pName = fallbackProteins[di % fallbackProteins.length] || '닭가슴살';
        usedNames.add(pName);
        portions.push({
          food: { name: pName }, grams: 100, role: '단백질',
          kcal:    proteinKcal,
          protein: Math.round(proteinKcal * 0.85 / 4),
          carb: 2, fat: Math.round(proteinKcal * 0.05 / 9),
        });
      }

      // ── [1] 탄수화물 슬롯 ───────────────────────────────────────
      const carbKcal = Math.round(mealKcal * macroRatio.carb);
      const carbName = pickCarbFromPool(mt, usedCarbsByMeal);
      const carbFood = (typeof FOODS_DB !== 'undefined')
        ? FOODS_DB.find(f => f.name?.includes(carbName) && f.meals?.includes(mt))
        : null;

      if (carbFood) {
        const r = carbKcal / carbFood.kcal;
        const g = Math.min(Math.max(Math.round(r * carbFood.amount / 10) * 10, 30), 250);
        const scale = g / carbFood.amount;
        portions.push({
          food: carbFood, grams: g, role: '탄수화물',
          kcal:    Math.round(carbFood.kcal    * scale),
          protein: Math.round(carbFood.protein * scale * 10) / 10,
          carb:    Math.round(carbFood.carb    * scale * 10) / 10,
          fat:     Math.round(carbFood.fat     * scale * 10) / 10,
        });
      } else {
        portions.push({
          food: { name: carbName }, grams: 130, role: '탄수화물',
          kcal: carbKcal,
          protein: Math.round(carbKcal * 0.07 / 4),
          carb:    Math.round(carbKcal * 0.85 / 4),
          fat:     Math.round(carbKcal * 0.01 / 9),
        });
      }

      // ── [2] 야채 슬롯 (2~3종 조합, 규칙 3) ─────────────────────
      const veggieKcal  = mealKcal - portions.reduce((s, p) => s + p.kcal, 0);
      const veggieCombo = pickVeggieCombo(badWords, usedCombos);
      const veggieLabel = veggieCombo.names.join(' + ');
      const veggieG     = Math.min(Math.max(Math.round(veggieKcal / veggieCombo.kcalPer100 * 100), 100), 250);
      const vScale      = veggieG / 100;
      portions.push({
        food: { name: veggieLabel, category: '야채' },
        grams:   veggieG,
        role:    '야채',
        kcal:    Math.round(veggieCombo.kcalPer100 * vScale),
        protein: Math.round(veggieCombo.protein    * vScale * 10) / 10,
        carb:    Math.round(veggieCombo.carb       * vScale * 10) / 10,
        fat:     Math.round(veggieCombo.fat        * vScale * 10) / 10,
      });

      const totalKcal = portions.reduce((s, p) => s + p.kcal, 0);
      dayMeals[mt] = { portions, totalKcal };
    }

    weekPlan.push({ day: days[di], dayIndex: di + 1, meals: dayMeals, mealTypes });
  }

  return {
    weekPlan,
    mealTypes,
    targetCal,
    generalMealGuide: GENERAL_MEAL_GUIDE,
    hasGeneralMealSlots: needsLunchSlot || needsDinnerSlot,
  };
}

function resolveStretching(d){
  const act=d.운동종류||'',job=d.직장형태||'',steps=d.걸음수||'';
  const bmi=(d.키&&d.현재체중)?d.현재체중/((d.키/100)**2):0;
  if(act.includes('러닝')||act.includes('달리기'))return STRETCHING_VIDEOS.running;
  if(job.includes('사무')||d.앉아있는시간?.includes('10시간'))return STRETCHING_VIDEOS.upper;
  if(steps.includes('8,000')||steps.includes('10,000')||bmi>=25)return STRETCHING_VIDEOS.lower;
  return STRETCHING_VIDEOS.daily;
}
function buildVideoMap(d){
  const map={...VIDEO_MAP};
  const s=resolveStretching(d);
  map.D4={...s};map.D11={...s};map.D18={...s};map.D25={...s};
  return map;
}

        2. 음료는 물 또는 제로음료<br>
        3. 탄수화물 + 지방 과다 조합 피하기<br>
        4. 다음 끼니 굶지 않기 — 정상식 복귀<br>
        5. 추천: 샤브샤브, 초밥, 삼겹살+밥 반공기, 파스타(단백질 추가)
      </div>
    </div>`;
 
  document.getElementById('meal-section').innerHTML = mealHtml;

  // 운동
  const typeLabel={tabata:'타바타',lower:'하체',upper:'상체',core:'코어',strength:'전신근력',stretch:'스트레칭'};
  const typeClass={tabata:'wt-tabata',lower:'wt-lower',upper:'wt-upper',core:'wt-core',strength:'wt-strength',stretch:'wt-stretch'};
  document.getElementById('workout-level-label').textContent=`${plan.level} 기준 · 주 5회 운동 + 2회 스트레칭/휴식`;
  document.getElementById('workout-legend').innerHTML=Object.entries(typeLabel).map(([t,l])=>`<span class="workout-badge ${typeClass[t]}">${l}</span>`).join('');

  const dayKeys=['mon','tue','wed','thu','fri','sat','sun'];
  document.getElementById('workout-section').innerHTML=plan.weeks.map((w,wi)=>`
    <div class="workout-week">
      <div class="workout-head" onclick="toggleBlock(this)">
        <span>${wi+1}주차</span><span style="font-size:12px;color:var(--text3);">▼</span>
      </div>
      <div class="workout-body ${wi===0?'open':''}">
        ${dayKeys.map((dk,di)=>{
          const vid=videoMap[w[dk]];
          if(!vid)return`<div class="workout-day"><span class="workout-day-label">${dayL[di]}</span><span class="wt-rest">휴식</span></div>`;
          return`<div class="workout-day">
            <span class="workout-day-label">${dayL[di]}</span>
            <span class="workout-badge ${typeClass[vid.type]}">${typeLabel[vid.type]}</span>
            <a href="${vid.url}" target="_blank" class="workout-link has-url">▶ ${vid.label}</a>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');

  document.getElementById('loading').style.display='none';
  document.getElementById('main').style.display='block';
}

// ──────────────────────────────────────────
// 초기 로드
// ──────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(location.search);
  const memberId = params.get('memberId');

  if (!memberId) {
    document.getElementById('loading').innerHTML = '<span style="font-size:32px">😅</span><br>잘못된 링크예요. 코치에게 문의해주세요.';
    return;
  }

  try {
    const res = await fetch(`/api/member-data?memberId=${memberId}`);
    if (!res.ok) throw new Error('데이터 없음');
    const { data } = await res.json();
    if (!data || !data.이름) throw new Error('설문 데이터가 없습니다');
    renderAll(data);
  } catch (e) {
    document.getElementById('loading').innerHTML = `<span style="font-size:32px">😅</span><br>데이터를 불러올 수 없어요.<br><span style="font-size:12px;color:var(--text3);">${e.message}</span>`;
  }
}

init();
</script>
</body>
</html>
